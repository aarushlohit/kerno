apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kerno
  labels:
    {{- include "kerno.labels" . | nindent 4 }}
rules:
  # ── Pod enrichment (cgroup → pod name, namespace, labels) ───────────
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kerno
  labels:
    {{- include "kerno.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kerno
subjects:
  - kind: ServiceAccount
    name: kerno
    namespace: {{ .Release.Namespace }}
