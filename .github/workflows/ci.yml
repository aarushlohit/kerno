name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.4"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  # Lints against the no-clang stub mode (the default). The stubs match
  # the generated types one-for-one, so linting picks up any drift.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ── Unit Tests ────────────────────────────────────────────────────────────
  # Tests run in stub mode; they exercise pure-Go logic (aggregators,
  # decoders, rules, CLI) which doesn't depend on real BPF loading.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────
  # `make build-ebpf` installs nothing extra here because the action already
  # has clang available, runs `make generate`, and then `make build GOTAGS=ebpf`
  # so the released binary embeds real eBPF bytecode (not stubs).
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version detection.

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install BPF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-generic

      - name: Build binary (with eBPF bytecode)
        run: make build-ebpf

      - name: Verify binary
        run: ./bin/kerno version

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: kerno-linux-amd64
          path: bin/kerno
          retention-days: 7

  # ── Systemd Runtime Validation ───────────────────────────────────────────
  # Installs the built binary and unit into real systemd paths, starts the
  # service, validates /healthz, checks journal output, and stops cleanly.
  systemd:
    name: Systemd Runtime
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install runtime test dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends curl jq

      - name: Download built binary
        uses: actions/download-artifact@v7
        with:
          name: kerno-linux-amd64
          path: bin

      - name: Prepare built binary
        run: chmod +x bin/kerno

      - name: Validate systemd service startup and health endpoint
        run: ./scripts/test-systemd-service.sh

  # ── BPF Compile Check ────────────────────────────────────────────────────
  bpf:
    name: BPF Compile
    runs-on: ubuntu-22.04
    # Only run when BPF source files change.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'bpf')
    steps:
      - uses: actions/checkout@v6

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libbpf-dev \
            linux-headers-$(uname -r)

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # This will fail gracefully until Phase 1 adds BPF sources.
      - name: Compile BPF programs
        run: |
          if ls internal/bpf/c/*.c 1>/dev/null 2>&1; then
            make bpf
          else
            echo "No BPF sources yet — skipping"
          fi

  # ── Docker Build (no push) ───────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ghcr.io/optiqor/kerno:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
