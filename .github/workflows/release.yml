name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install BPF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-generic

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  snapshot:
    name: Snapshot build (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install BPF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-generic

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot packages
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-packages
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 1

  package-install-test:
    name: Test package install (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: [release, snapshot]
    if: always() && (needs.release.result == 'success' || needs.snapshot.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          # deb targets
          - distro: ubuntu-22.04
            image: ubuntu:22.04
            pkg_type: deb
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            pkg_type: deb
          - distro: debian-12
            image: debian:12
            pkg_type: deb
          # rpm targets
          - distro: fedora-39
            image: fedora:39
            pkg_type: rpm
          - distro: al2023
            image: amazonlinux:2023
            pkg_type: rpm
          - distro: rhel-9
            image: rockylinux:9
            pkg_type: rpm
    steps:
      - name: Download snapshot packages (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: snapshot-packages
          path: ./packages

      - name: Download release assets (tag)
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ matrix.pkg_type }}" in
            deb) ARCH=amd64 ;;
            rpm) ARCH=x86_64 ;;
          esac
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "*${ARCH}*.${{ matrix.pkg_type }}" \
            --dir ./packages

      - name: Test install on ${{ matrix.distro }}
        run: |
          case "${{ matrix.pkg_type }}" in
            deb) ARCH=amd64 ;;
            rpm) ARCH=x86_64 ;;
          esac
          PKG=$(ls ./packages/*${ARCH}*.${{ matrix.pkg_type }} | head -1)

          docker run --rm \
            -v "$(pwd)/packages:/pkgs" \
            "${{ matrix.image }}" \
            bash -exc "
              if [ '${{ matrix.pkg_type }}' = 'deb' ]; then
                apt-get update -q
                apt-get install -y --no-install-recommends systemd
                dpkg -i /pkgs/$(basename $PKG) || apt-get install -f -y
              else
                dnf install -y systemd /pkgs/$(basename $PKG)
              fi

              test -x /usr/bin/kerno
              echo 'PASS: binary present'

              test -f /etc/systemd/system/kerno.service
              echo 'PASS: systemd unit present'

              test -f /etc/kerno/config.yaml
              echo 'PASS: config file present'

              id kerno
              echo 'PASS: kerno user exists'

              stat -c '%U' /etc/kerno/config.yaml | grep -q kerno
              echo 'PASS: config ownership correct'
            "

      - name: Test removal on ${{ matrix.distro }}
        run: |
          case "${{ matrix.pkg_type }}" in
            deb) ARCH=amd64 ;;
            rpm) ARCH=x86_64 ;;
          esac
          PKG=$(ls ./packages/*${ARCH}*.${{ matrix.pkg_type }} | head -1)

          docker run --rm \
            -v "$(pwd)/packages:/pkgs" \
            "${{ matrix.image }}" \
            bash -exc "
              if [ '${{ matrix.pkg_type }}' = 'deb' ]; then
                apt-get update -q
                apt-get install -y --no-install-recommends systemd
                dpkg -i /pkgs/$(basename $PKG) || apt-get install -f -y
                dpkg --remove kerno
              else
                dnf install -y systemd /pkgs/$(basename $PKG)
                dnf remove -y kerno
              fi

              ! test -f /usr/bin/kerno
              echo 'PASS: binary removed'
            "

      - name: Test purge on ${{ matrix.distro }}
        run: |
          case "${{ matrix.pkg_type }}" in
            deb) ARCH=amd64 ;;
            rpm) ARCH=x86_64 ;;
          esac
          PKG=$(ls ./packages/*${ARCH}*.${{ matrix.pkg_type }} | head -1)

          docker run --rm \
            -v "$(pwd)/packages:/pkgs" \
            "${{ matrix.image }}" \
            bash -exc "
              if [ '${{ matrix.pkg_type }}' = 'deb' ]; then
                apt-get update -q
                apt-get install -y --no-install-recommends systemd
                dpkg -i /pkgs/$(basename $PKG) || apt-get install -f -y
                dpkg --purge kerno
              else
                dnf install -y systemd /pkgs/$(basename $PKG)
                dnf remove -y kerno
              fi

              ! test -f /usr/bin/kerno
              echo 'PASS: binary removed'

              ! test -f /etc/kerno/config.yaml
              echo 'PASS: config removed'
            "
